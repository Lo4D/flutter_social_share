name: flutter_social_share
description: A simple Flutter plugin for sharing content to social media platforms.
version: 0.2.0

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.devscribed.flutter_social_share
        pluginClass: FlutterSocialSharePlugin
      ios:
        pluginClass: FlutterSocialSharePlugin
